name: Deploy Vite Site to Pages

on:
  push:
    branches:
      - master
      - main
      - stable
    # Wir entfernen paths-ignore, damit er bei JEDEM Push startet
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed
    branches:
      - master
      - main
      - stable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read # Erforderlich für die Abfrage des Docker-Build-Status

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Docker Build if running
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUNNING=$(gh run list --workflow "Build Docker Image" --status in_progress --json databaseId -q '.[].databaseId' || echo "")
          if [ -n "$RUNNING" ]; then
            echo "Docker Build läuft (ID: $RUNNING). Warte..."
            gh run watch $RUNNING
          fi

      - name: Build WASM assets
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Build Vite Site
        run: |
          chmod +x ./build_vite.sh
          ./build_vite.sh -m build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4