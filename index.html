<!doctype html>
<html lang="de" class="h-full bg-slate-950 text-slate-100">
  <head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minetest Web-Launcher</title>
    <style>
      @tailwind base;
      @tailwind components;
      @tailwind utilities;
    </style>
  </head>
  <body class="h-full flex flex-col items-center justify-center p-4 antialiased selection:bg-emerald-500 selection:text-slate-950">

    <!-- Haupt-Container -->
    <main class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden p-6 md:p-8 transition-all duration-300">
      
      <!-- Header -->
      <header class="text-center mb-8">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">
          Minetest
        </h1>
        <p class="text-sm text-slate-400 mt-1">Web Edition Launcher</p>
      </header>

      <!-- 1. STARTUP / LADEBILDSCHIRM -->
      <div id="loading_screen" class="flex flex-col items-center justify-center py-8 space-y-6">
        <!-- Fortschritts-Text / Status -->
        <div class="text-center space-y-1">
          <p id="status_task" class="text-emerald-400 font-medium tracking-wide animate-pulse">Initialisiere Launcher...</p>
          <p id="status_percent" class="text-5xl font-black text-slate-200">0%</p>
        </div>
        
        <!-- Visueller Ladebalken -->
        <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden p-0.5 border border-slate-700/50">
          <div id="loading_bar" class="h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full transition-all duration-200 ease-out" style="width: 0%"></div>
        </div>
      </div>

      <!-- 2. LAUNCH FORMULAR (Standardmäßig ausgeblendet, bis mtl bereit ist) -->
      <div id="launch_form" class="hidden space-y-6">
        
        <!-- Proxy Auswahl -->
        <div class="space-y-2">
          <label for="select_proxy" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">
            Netzwerk-Proxy
          </label>
          <select id="select_proxy" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition cursor-pointer">
            <!-- Wird via JS befüllt -->
          </select>
        </div>

        <!-- Sprache Auswahl -->
        <div class="space-y-2">
          <label for="select_language" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">
            Sprache / Language
          </label>
          <select id="select_language" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition cursor-pointer">
            <!-- Wird via JS befüllt -->
          </select>
        </div>

        <div class="space-y-2">
          <label for="input_port" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">
            Server Port
          </label>
          <input type="number" id="input_port" value="33631" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
        </div>

        <div class="space-y-2">
          <label for="input_username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">
            Spielername
          </label>
          <input type="text" id="input_username" placeholder="Dein Name" maxlength="19" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
        </div>

        <div class="space-y-2">
          <label for="input_password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">
            Passwort
          </label>
          <input type="password" id="input_password" placeholder="Passwort eingeben..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
        </div>

        <!-- Trennlinie & Launch Button -->
        <div class="pt-4 border-t border-slate-850">
          <button id="launch" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-slate-950 font-bold text-lg py-4 px-6 rounded-xl shadow-lg shadow-emerald-500/10 hover:shadow-emerald-400/20 active:scale-[0.98] transition transform duration-155">
            Spiel starten
          </button>
        </div>
      </div>

      <!-- 3. ERROR ANZEIGE -->
      <div id="error_screen" class="hidden bg-red-950/40 border border-red-900/50 rounded-xl p-4 text-center space-y-2">
        <p class="text-sm font-bold text-red-400 uppercase tracking-wider">Kritischer Fehler</p>
        <p id="error_message" class="text-xs text-red-300 font-mono break-all"></p>
      </div>

    </main>

    <!-- Scripte -->
    <script type="text/javascript" src="wasm/launcher.js"></script>
    <script type="text/javascript">
      const loadingScreen = document.getElementById('loading_screen');
      const launchForm = document.getElementById('launch_form');
      const errorScreen = document.getElementById('error_screen');
      
      const statusTask = document.getElementById('status_task');
      const statusPercent = document.getElementById('status_percent');
      const loadingBar = document.getElementById('loading_bar');
      const errorMessage = document.getElementById('error_message');

      function wipePage() {
          // Blendet das gesamte UI-Fenster vor dem eigentlichen Canvas-Start aus
          document.querySelector('main').remove();
      }

      function enableLaunchForm() {
          // Ladebildschirm weg, Formular sanft einblenden
          loadingScreen.remove();
          launchForm.classList.remove('hidden');

          const select_proxy = document.getElementById('select_proxy');
          const proxies = [
              [ "wss://eu1.dustlabs.io/mtproxy", "Europa (Standard)" ],
          ];
          proxies.forEach((entry, index) => {
              const opt = document.createElement('option');
              opt.value = index;
              opt.innerText = entry[1];
              select_proxy.appendChild(opt);
          });

          const select_language = document.getElementById('select_language');
          SUPPORTED_LANGUAGES.forEach(entry => {
              const opt = document.createElement('option');
              opt.value = entry[0];
              opt.innerText = entry[1];
              select_language.appendChild(opt);
          });
          select_language.value = getDefaultLanguage();

          const launch = document.getElementById('launch');
          launch.addEventListener('click', () => {
              const proxyIndex = document.getElementById('select_proxy').value;
              const proxy = proxies[proxyIndex][0];
              const port = document.getElementById('input_port').value;
              const username = document.getElementById('input_username').value;
              const password = document.getElementById('input_password').value;

              if (!username || username.trim() === "") {
                  alert("Bitte gib einen Benutzernamen ein!");
                  return;
              }

              wipePage();
              mtl.setProxy(proxy);
              mtl.setLang(select_language.value);
              
              if (mtl.setPassword) {
                  mtl.setPassword(password);
              } else {
                  args.password = password;
              }
              
              const launchArgs = args; 
              launchArgs.address = 'space.blockalot.de';
              launchArgs.port = parseInt(port);
              launchArgs.name = username;
              launchArgs.go = true;
              
              mtl.launch(launchArgs);
          });
      }

      const args = MinetestArgs.fromQueryString(window.location.search);
      const mtl = new MinetestLauncher();
      mtl.addPacks(args.packs);

      mtl.onprint = (text) => {
          console.log("[Minetest]", text);
      };

      // Fortschritt an den neuen Ladebalken übergeben
      mtl.onprogress = (name, progress) => {
          const pctValue = Math.round(progress * 100);
          statusTask.innerText = `Lade Asset: ${name}...`;
          statusPercent.innerText = `${pctValue}%`;
          loadingBar.style.width = `${pctValue}%`;
      };

      mtl.onready = () => {
          enableLaunchForm();
      };

      mtl.onerror = (err) => {
          loadingScreen.classList.add('hidden');
          launchForm.classList.add('hidden');
          errorScreen.classList.remove('hidden');
          errorMessage.innerText = err;
          console.error(err);
      };
    </script>
  </body>
</html>
