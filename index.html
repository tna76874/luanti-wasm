<!doctype html>
<html lang="de" class="h-full bg-slate-950 text-slate-100">
  <head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="utf-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luanti Web-Launcher</title>
    <style>
      @tailwind base;
      @tailwind components;
      @tailwind utilities;
    </style>
  </head>
  <body class="h-full flex flex-col items-center justify-center p-4 antialiased selection:bg-emerald-500 selection:text-slate-950">

    <main class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden p-6 md:p-8">
      <header class="text-center mb-8">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">
          Luanti
        </h1>
        <p class="text-sm text-slate-400 mt-1">Web Edition Launcher</p>
      </header>

      <div id="loading_screen" class="flex flex-col items-center justify-center py-8 space-y-6">
        <div class="text-center space-y-1">
          <p id="status_task" class="text-emerald-400 font-medium tracking-wide animate-pulse">Initialisiere...</p>
          <p id="status_percent" class="text-5xl font-black text-slate-200">0%</p>
        </div>
        <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden p-0.5 border border-slate-700/50">
          <div id="loading_bar" class="h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full transition-all duration-200" style="width: 0%"></div>
        </div>
      </div>

      <div id="launch_form" class="hidden space-y-6">
        <div id="proxy_container" class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Netzwerk-Proxy</label>
          <select id="select_proxy" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500"></select>
          <!-- Warnbox -->
          <div id="proxy_warning" class="hidden bg-amber-500/10 border border-amber-500/50 p-3 rounded-xl text-amber-500 text-xs leading-relaxed">
            ⚠️ <strong>Vorsicht:</strong> Dieser Proxy wird von einer Drittpartei betrieben. Deine Zugangsdaten und dein gesamter Spielverkehr sind für den Betreiber potenziell einsehbar. Nutze für sensible Accounts nur vertrauenswürdige Proxys.
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Server</label>
          <select id="select_server" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500">
            <option value="33631">Server A (33631)</option>
            <option value="33633">Server B (33633)</option>
            <option value="custom">Eigener Port...</option>
          </select>
          <input type="number" id="input_custom_port" placeholder="Port eingeben" class="hidden w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500">
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Spielername</label>
          <input type="text" id="input_username" maxlength="19" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500">
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Passwort</label>
          <input type="password" id="input_password" placeholder="Passwort eingeben..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500">
        </div>

        <button id="launch" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 text-slate-950 font-bold text-lg py-4 px-6 rounded-xl shadow-lg active:scale-[0.98] transition">
          Spiel starten
        </button>
      </div>
    </main>

    <script type="text/javascript" src="wasm/launcher.js"></script>
    <script type="text/javascript">
      const proxies = [
        { url: "wss://proxy.luanti.einstein-gym.eu", name: "AEG", trusted: true },
        { url: "ws://localhost:8080", name: "Lokaler Proxy (Port 8080)", trusted: true },
        { url: "wss://eu1.dustlabs.io/mtproxy", name: "Europa (Drittanbieter)", trusted: false }
      ];

      const mtl = new MinetestLauncher();
      const args = MinetestArgs.fromQueryString(window.location.search);
      const urlParams = new URLSearchParams(window.location.search);

      const selectServer = document.getElementById('select_server');
      const customPortInput = document.getElementById('input_custom_port');
      const proxyContainer = document.getElementById('proxy_container');
      const selectProxy = document.getElementById('select_proxy');
      const proxyWarning = document.getElementById('proxy_warning');

      function updateProxyWarning() {
        const isTrusted = proxies[selectProxy.value].trusted;
        proxyWarning.classList.toggle('hidden', isTrusted);
      }

      selectProxy.addEventListener('change', updateProxyWarning);

      proxies.forEach((p, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.text = `${p.name} ${p.trusted ? '' : '⚠️'}`;
        selectProxy.appendChild(option);
      });

      function startMinetest(port, username, password) {
        const proxy = proxies[selectProxy.value];

        if (!proxy.trusted) {
          if (!confirm("Sicherheitswarnung:\n\nDu verwendest einen Proxy einer Drittpartei. Dein Passwort und dein Account könnten abgegriffen werden. Möchtest du wirklich fortfahren?")) {
            return;
          }
        }

        document.querySelector('main').remove();
        mtl.setProxy(proxy.url);
        
        if (mtl.setPassword) mtl.setPassword(password);
        else args.password = password;
        
        args.address = '188.40.133.58';
        args.port = parseInt(port);
        args.name = username;
        args.go = true;
        mtl.launch(args);
      }

      selectServer.addEventListener('change', (e) => {
        customPortInput.classList.toggle('hidden', e.target.value !== 'custom');
      });

      mtl.onprogress = (name, progress) => {
        const bar = document.getElementById('loading_bar');
        const task = document.getElementById('status_task');
        const pct = document.getElementById('status_percent');
        if (bar && task && pct) {
          const val = Math.round(progress * 100);
          bar.style.width = val + '%';
          task.innerText = `Lade Asset: ${name}...`;
          pct.innerText = val + '%';
        }
      };

      mtl.onready = () => {
        const inputUsername = document.getElementById('input_username');
        const inputPassword = document.getElementById('input_password');
        const inputCustomPort = document.getElementById('input_custom_port');
        
        const p = urlParams.get('port');
        const u = urlParams.get('username');
        const pw = urlParams.get('password');

        if (u) inputUsername.value = u;
        if (pw) inputPassword.value = pw;
        if (p) {
            inputCustomPort.value = p;
            inputCustomPort.classList.remove('hidden');
            selectServer.value = "custom";
        }

        if (p && u && pw) {
          startMinetest(p, u, pw);
        } else {
          document.getElementById('loading_screen').remove();
          document.getElementById('launch_form').classList.remove('hidden');
          if (proxies.length <= 1) proxyContainer.classList.add('hidden');
        }
      };

      document.getElementById('launch').addEventListener('click', () => {
        const port = selectServer.value === 'custom' ? customPortInput.value : selectServer.value;
        const username = document.getElementById('input_username').value;
        const password = document.getElementById('input_password').value;
        
        if (!username) return alert("Benutzername fehlt!");
        startMinetest(port, username, password);
      });
    </script>
  </body>
</html>
